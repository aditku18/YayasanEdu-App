<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Yayasan Kemala Bhayangkari</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen">
    <div class="flex h-screen">
        <!-- Sidebar with Logo -->
        <aside class="w-64 bg-gray-800 text-white">
            <div class="flex items-center gap-3 px-6 h-16 border-b border-gray-700">
                
                <img src="/storage/uploads/foundations/1/logo.png" 
                     alt="Yayasan Kemala Bhayangkari Logo" 
                     class="w-9 h-9 rounded-lg object-cover shadow-lg"
                     onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';">
                <div class="w-9 h-9 bg-gradient-to-br from-blue-400 to-indigo-600 rounded-lg flex items-center justify-center shadow-lg" style="display: none;">
                    <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4"/>
                    </svg>
                </div>
                
                <div>
                    <span class="text-lg font-bold">Yayasan Kemala Bhayangkari</span>
                    <span class="block text-xs text-gray-400">tenant-yayasan-kemala-bhayangkari</span>
                </div>
            </div>
            
            <nav class="p-4">
                <a href="#" class="block py-2 px-4 rounded hover:bg-gray-700">Dashboard</a>
                <a href="#" class="block py-2 px-4 rounded hover:bg-gray-700">Keuangan</a>
                <a href="#" class="block py-2 px-4 rounded hover:bg-gray-700">Data Sekolah</a>
            </nav>
        </aside>
        
        <!-- Main Content -->
        <main class="flex-1 p-8">
            <h1 class="text-3xl font-bold mb-6">Dashboard</h1>
            <div class="bg-white rounded-lg shadow p-6">
                <h2 class="text-xl font-semibold mb-4">Selamat Datang!</h2>
                <p>Ini adalah dashboard untuk <strong>Yayasan Kemala Bhayangkari</strong>.</p>
                
                
                <div class="mt-6">
                    <h3 class="font-semibold mb-2">Logo Test:</h3>
                    <img src="/storage/uploads/foundations/1/logo.png" alt="Foundation Logo" class="w-16 h-16 rounded-lg shadow-md" />
                </div>
                
            </div>
        </main>
    </div>
</body>
</html>
